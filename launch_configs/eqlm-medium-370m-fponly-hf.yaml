run_name: eqlm-medium-370m-fponly-hf
resume: False
max_tokens: 5_000_000_000        # ~17% of original 29.6B budget
seed: 7
out_dir: "/scratch1/feinashl/eqlm/eqlm-medium-370m-fponly-hf"
model_name: eqlm-medium-370m
model_impl: dynamic
block_size: 2048

# === FP-only fine-tuning (HF source) ===
# Loads the HF state_dict; fp_only_load extracts model weights only.
model_checkpoint: "/scratch1/feinashl/hf_cache/hub/models--jacobfa1--eqlm-370m/snapshots/d8850da3457b3e51c15b2966758ce01eebec3587/model.pt"
freeze_backbone: true
reinit_fp_weights: true
# reinit_fp_std defaults to 1/sqrt(n_embd) = 1/sqrt(1280) ≈ 0.028

partial_depth_eval: [1, 2, 4]

model_overwrite:
  vocab_size: 32768

world_batch_size: 256
micro_batch_size: 32

optimizer: MuonAdamW
optim_config:
  lr: 4e-3
  weight_decay: 0.0
  betas: [0.8, 0.95]
  eps: 1e-10
  muon_lr: 4e-3
  muon_momentum: 0.95
  muon_wd: 0.1
  muon_ns_steps: 5

warmup_steps: 0.02
cooldown_steps: 0.5
lr_schedule: trapezoid
min_lr: 0
grad_clip: 1.0
no_weight_decay_for_bias_and_norm_params: True

z_regularization: 0
label_smoothing: 0

fabric_strategy: ddp
fabric_precision: bf16-mixed
fabric:
  optim_sharding: False

compile_model: False
gradient_checkpointing: False

loss_guardrail_active: True
skip_nonfinite_grads: True
allow_nonfinite_loss: False

logger_project: "eqlm"
model_telemetry: True
log_step_interval: 64
save_step_interval: 1024
eval_step_interval: 256
eval_iters: 16
save_last_step: True

all_block_size_tensors: False
pack_sequences: True

data_config:
  train_data:
    - type: pqds-pure
      prefix: ""
      weight: 1
      data_dir: "/scratch1/feinashl/data/fineweb-edu-shuffled/sample-100BT/data/sample-100BT/train"
      data_signature:
        keys: ["text"]
  val_data:
    - type: pqds-pure
      prefix: ""
      weight: 1
      data_dir: "/scratch1/feinashl/data/fineweb-edu-shuffled/val/data/val/train"
      data_signature:
        keys: ["text"]

tokenizer_path: "/scratch1/feinashl/tokenizer/parcae_tokenizer"
